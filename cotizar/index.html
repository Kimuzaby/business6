<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Crear Cotización | La Casa de las Flores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="cotizar.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="admin-body">

  <header class="admin-nav">
    <div class="logo">
      <span class="logo-icon">❧</span> 
      <span class="logo-text">La Casa de las Flores | <span style="font-family: var(--font-sans); font-size: 0.9rem; color: var(--muted-fg);">Workspace</span></span>
    </div>
    <button type="button" class="btn-logout" onclick="window.logout()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Salir
    </button>
  </header>

  <main class="admin-main">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2 class="form-title">Generador de Propuestas</h2>
        <p class="form-subtitle">Completa los datos para exportar el PDF premium para tu cliente.</p>
      </div>

      <div class="admin-section">
        <h3 class="section-title">Datos Generales</h3>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Nombre del Cliente</label>
            <input type="text" id="client-name" class="field-input" placeholder="Ej. María Pérez">
          </div>
          <div class="field-group">
            <label class="field-label">Fecha del Evento</label>
            <input type="date" id="client-date" class="field-input">
          </div>
        </div>
        
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Tipo de Evento</label>
            <input type="text" id="client-event" class="field-input" placeholder="Ej. Boda Civil">
          </div>
          <div class="field-group">
            <label class="field-label">Validez de la cotización</label>
            <input type="text" id="client-validity" class="field-input" value="15 días">
          </div>
        </div>
      </div>

      <div class="admin-section">
        <h3 class="section-title">Detalle de Arreglos</h3>
        
        <div class="items-header">
          <span>Elemento / Arreglo</span>
          <span>Descripción Breve</span>
          <span>Cant.</span>
          <span>Precio Unit ($)</span>
          <span></span>
        </div>

        <div class="items-container" id="items-container">
          </div>
        
        <button type="button" class="btn-add" onclick="window.addItemRow()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Añadir Nuevo Arreglo
        </button>

        <div class="total-display">
          Total de la Inversión: <span style="color: var(--primary);">$<span id="grand-total">0.00</span></span>
        </div>
      </div>

      <button type="button" class="btn-submit btn-generate" onclick="window.generateInvoicePDF()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar Cotización (PDF)
      </button>
    </div>
  </main>

  <script type="module" src="cotizar.js"></script>
</body>
</html>
