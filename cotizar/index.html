<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Crear Cotización | La Casa de las Flores</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="cotizar.css">
  <!-- html2pdf es mejor para PDFs dinámicos con formato tabla/factura -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    /* Estilos extra para la tabla dinámica */
    .items-container { border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.5rem; }
    .item-row { display: grid; grid-template-columns: 2fr 3fr 1fr 1fr auto; gap: 0.5rem; margin-bottom: 0.5rem; align-items: start; }
    .btn-remove { background: #ffebee; color: #c62828; border: none; padding: 0.6rem; border-radius: 0.3rem; cursor: pointer; }
    .btn-add { background: transparent; border: 1px dashed var(--primary); color: var(--primary); width: 100%; padding: 0.8rem; border-radius: 0.5rem; cursor: pointer; font-family: var(--font-sans); }
    .total-display { text-align: right; font-size: 1.5rem; font-family: var(--font-serif); color: var(--primary); margin-top: 1rem; font-weight: 600; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 1rem 2rem; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body style="background: #fcfcfc;">

  <div class="admin-header">
    <div class="logo">
      <span class="logo-icon">❧</span> <span class="logo-text">Panel Administrativo</span>
    </div>
    <button onclick="logout()" style="background:none; border:none; cursor:pointer; color:var(--muted-fg);">Cerrar Sesión</button>
  </div>

  <main style="max-width: 900px; margin: 2rem auto; padding: 0 1rem;">
    <div class="form-card" style="max-width: 100%;">
      <h2 class="form-title">Generador de Cotizaciones</h2>
      <p class="form-subtitle">Crea una propuesta detallada para tu cliente.</p>

      <!-- Datos del Cliente -->
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Nombre del Cliente</label>
          <input type="text" id="client-name" class="field-input" placeholder="Ej. María Pérez">
        </div>
        <div class="field-group">
          <label class="field-label">Fecha del Evento</label>
          <input type="date" id="client-date" class="field-input">
        </div>
      </div>
      
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Tipo de Evento</label>
          <input type="text" id="client-event" class="field-input" placeholder="Ej. Boda Civil">
        </div>
        <div class="field-group">
          <label class="field-label">Validez de la cotización</label>
          <input type="text" id="client-validity" class="field-input" value="15 días">
        </div>
      </div>

      <!-- Elementos Dinámicos -->
      <h3 style="margin-top: 2rem; margin-bottom: 1rem; font-family: var(--font-serif);">Detalle de la Cotización</h3>
      <div class="items-container" id="items-container">
        <!-- Las filas se insertan aquí vía JS -->
      </div>
      
      <button class="btn-add" onclick="addItemRow()">+ Añadir Elemento</button>

      <div class="total-display">
        Total: $<span id="grand-total">0.00</span>
      </div>

      <!-- Botón Generar -->
      <button class="btn-submit" onclick="generateInvoicePDF()">
        Generar Cotización (PDF)
      </button>
    </div>

    <!-- Template oculto para el PDF -->
    <div id="pdf-template" style="display: none;"></div>
  </main>

  <script type="module" src="cotizar.js"></script>
</body>
</html>
